inputs_def:
  - handle: name
    description: "%sig-name%"
    json_schema:
      type: string
    value:
    nullable: true
  - handle: decorations
    description: "%sig-dec%"
    json_schema:
      type: string
    value:
    nullable: true
  - group: Options
  - handle: aspectRatio
    description: "%ai-image-generator-aspect-ratio-input%"
    json_schema:
      type: string
      enum:
        - 21:9
        - 16:9
        - 3:2
        - 4:3
        - 5:4
        - 1:1
        - 4:5
        - 3:4
        - 2:3
        - 9:16
    value: 16:9
    nullable: true
    executor_name: python
  - handle: resolution
    description: "%ai-image-generator-resolution-input%"
    json_schema:
      type: string
      enum:
        - 1K
        - 2K
        - 4K
    value: 1K
    nullable: true
    executor_name: python
outputs_def:
  - handle: success
    json_schema:
      type: boolean
    nullable: false
    description: "%ai-image-generator-success-output%"
    executor_name: python
  - handle: images
    json_schema:
      type: array
      items:
        type: string
        ui:widget: file
    nullable: false
    description: "%ai-image-generator-images-files-output%"
    executor_name: python
nodes:
  - node_id: nano-banana-pro-image-generate#1
    title: "Nano Banana Pro 图像生成 #1"
    inputs_from:
      - handle: prompt
        from_node:
          - node_id: prompt-editor#1
            output_handle: prompt
      - handle: aspectRatio
        value: 1:1
        from_flow:
          - input_handle: aspectRatio
      - handle: outputFormat
        value: png
      - handle: resolution
        value: 1K
        from_flow:
          - input_handle: resolution
      - handle: pollingInterval
        value: 2
      - handle: timeout
        value: 300
    subflow: nano_banana_pro::nano-banana-pro-image-generate
  - node_id: prompt-editor#1
    title: "提示词 #1"
    inputs_from:
      - handle: template
        value: "{{name}}.


          Integrate one decorative illustration inspired by
          {{decorations}} into the name composition so it visually interacts
          with the text. Position it naturally above, beside, or partially
          around the name.


          Add 4–8 small accent elements (such as tiny stars, hearts,
          dots, sparkles, leaves, or mini shapes inspired by {{decorations}}).
          Decorate them randomly and organically around the name. Keep them
          smaller than the main illustration.


          Font style: {{font_style}}.   Style: {{decoration_style}}.
          Format: {{format}}.\n"
      - handle: name
        value:
        from_node:
          - node_id: prompt-editor#6
            output_handle: prompt
          - node_id: prompt-editor#7
            output_handle: prompt
      - handle: decorations
        value:
        from_flow:
          []
        from_node:
          - node_id: +condition#2
            output_handle: case
          - node_id: prompt-editor#2
            output_handle: prompt
      - handle: format
        value: flat 2D digital illustration, straight-on view, no perspective, no desk,
          no table, no background surface, pure white canvas, kawaii aesthetic,
          cursive signature style
        from_node:
          - node_id: +value#2
            output_handle: format
      - handle: font_style
        value: dark color cursive fountain pen handwriting, slim elegant strokes, smooth
          flowing lines, smooth rounded letters, flowing connected strokes,
          playful and soft style, delicate lettering
        from_node:
          - node_id: +value#2
            output_handle: font_style
      - handle: decoration_style
        value: cartoon decorations around the text, kawaii aesthetic, soft colors for
          decorations only
        from_node:
          - node_id: +value#2
            output_handle: decoration_style
    task: llm::prompt-editor
    inputs_def:
      - handle: font_style
        json_schema:
          type: string
          ui:widget: text
        nullable: false
      - handle: decoration_style
        json_schema:
          type: string
          ui:widget: text
        nullable: false
      - handle: format
        json_schema:
          type: string
          ui:widget: text
        nullable: false
      - handle: name
        description: "%prompt-var%"
        json_schema:
          type: string
          ui:widget: text
        value: hello!
        nullable: true
      - handle: decorations
        json_schema:
          type: string
          ui:widget: text
        nullable: true
  - node_id: +condition#1
    title: "Condition #1"
    conditions:
      cases:
        - handle: case
          logical: AND
          expressions:
            - input_handle: name
              operator: is not empty
      default:
        handle: default
    inputs_def:
      - handle: name
        json_schema:
          type: string
          ui:widget: text
        nullable: true
    inputs_from:
      - handle: name
        value:
        from_flow:
          - input_handle: name
  - node_id: +condition#2
    title: "Condition #2"
    inputs_from:
      - handle: decorations
        value: null
        from_flow:
          - input_handle: decorations
    inputs_def:
      - handle: decorations
        json_schema:
          type: string
          ui:widget: text
        nullable: true
    conditions:
      cases:
        - handle: case
          logical: AND
          expressions:
            - input_handle: decorations
              operator: is not empty
      default:
        handle: default
  - node_id: +javascript#1
    title: "Preview #1"
    icon: ":twemoji:face-with-monocle:"
    task:
      ui:
        default_width: 450
      inputs_def:
        - handle: images
          json_schema:
            type: array
            items:
              type: string
              ui:widget: file
          nullable: false
          description: "%ai-image-generator-images-files-output1%"
      outputs_def:
        []
      executor:
        name: nodejs
        options:
          entry: scriptlets/+scriptlet#2.js
    inputs_from:
      - handle: images
        from_node:
          - node_id: nano-banana-pro-image-generate#1
            output_handle: images
  - node_id: +value#2
    title: "Value #2"
    values:
      - handle: font_style
        json_schema:
          type: string
          ui:widget: text
        value: cute monoline cursive script font. Smooth rounded letters, flowing
          connected strokes. Add elegant swashes and gentle decorative
          flourishes to the capital letter and the ending stroke. Extend the
          entry and exit strokes slightly to create graceful curves, while
          keeping the text clean and highly readable
      - handle: decoration_style
        json_schema:
          type: string
          ui:widget: text
        value: cartoon decorations around the text, kawaii aesthetic, soft colors for
          decorations only
      - handle: format
        json_schema:
          type: string
          ui:widget: text
        value: flat 2D digital illustration, straight-on view, no perspective, no desk,
          no table, no background surface, not bold, not thick, no shadow, no
          texture, pure white canvas
  - node_id: prompt-editor#6
    title: "%default-name%"
    inputs_from:
      - handle: template
        value: "Create a nursery name design that says a random name in a cute monoline
          cursive script font. "
      - handle: input
        value: hello!
        from_node:
          - node_id: +condition#1
            output_handle: default
    task: llm::prompt-editor
    inputs_def:
      - handle: input
        description: "%prompt-var%"
        json_schema:
          type: string
          ui:widget: text
        value: hello!
        nullable: true
  - node_id: prompt-editor#7
    title: "name"
    inputs_from:
      - handle: template
        value: Create a nursery name design that says "{{name}}" in a cute monoline
          cursive script font.
      - handle: name
        value: hello!
        from_node:
          - node_id: +condition#1
            output_handle: case
    task: llm::prompt-editor
    inputs_def:
      - handle: name
        description: "%prompt-var%"
        json_schema:
          type: string
          ui:widget: text
        value: hello!
        nullable: true
  - node_id: prompt-editor#2
    title: "%default-decorations%"
    inputs_from:
      - handle: template
        value: cute animals like cats, bunnies, or birds, plus stars, hearts, and
          sparkles
      - handle: _
        value: hello!
        from_node:
          - node_id: +condition#2
            output_handle: default
    task: llm::prompt-editor
    inputs_def:
      - handle: _
        description: "%prompt-var%"
        json_schema:
          type: string
          ui:widget: text
        value: hello!
        nullable: true
title: "%gen-sig%"
outputs_from:
  - handle: success
    from_node:
      - node_id: nano-banana-pro-image-generate#1
        output_handle: success
  - handle: images
    from_node:
      - node_id: nano-banana-pro-image-generate#1
        output_handle: images
forward_previews:
  - +javascript#1
